openapi: 3.0.3
info:
  title: Booking Service API
  version: 1.0.0
x-curl-examples:
  createBooking:
    description: Create booking for seeded trip. Payment Service will emit Kafka event and Booking should become CONFIRMED.
    command: |
      curl -X POST http://localhost:8080/api/bookings \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $TOKEN" \
        -d '{"tripId":"44444444-4444-4444-4444-444444444444","seatNumber":"1"}'
  getBooking:
    description: Get booking by id.
    command: |
      curl http://localhost:8080/api/bookings/REPLACE_WITH_BOOKING_ID \
        -H "Authorization: Bearer $TOKEN"
  myBookings:
    description: List current user's bookings.
    command: |
      curl http://localhost:8080/api/bookings/my \
        -H "Authorization: Bearer $TOKEN"
  cancelBooking:
    description: Cancel booking and release one seat in Trip Service.
    command: |
      curl -X POST http://localhost:8080/api/bookings/REPLACE_WITH_BOOKING_ID/cancel \
        -H "Authorization: Bearer $TOKEN"
paths:
  /api/bookings:
    post:
      summary: Create booking
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /api/bookings/{id}:
    get:
      summary: Get booking
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /api/bookings/my:
    get:
      summary: List current user's bookings
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /api/bookings/{id}/cancel:
    post:
      summary: Cancel booking
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
