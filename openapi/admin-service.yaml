  /api/admin/cargo-orders:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Cargo]
      summary: List cargo orders
      operationId: adminListCargoOrders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CargoStatus'
        - name: tripId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: paymentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Cargo orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CargoOrder'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/cargo-orders/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Cargo]
      summary: Get cargo order by id
      operationId: adminGetCargoOrder
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Cargo order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargoOrder'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Admin Cargo]
      summary: Cancel cargo order
      operationId: adminCancelCargoOrder
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Cancelled cargo order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargoOrder'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/cargo-orders/trips/{tripId}/capacity:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Cargo]
      summary: Get cargo capacity for a trip
      operationId: adminGetTripCargoCapacity
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cargo capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargoCapacity'
        '403':
          $ref: '#/components/responses/AdminForbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AdminUserIdHeader:
      name: X-User-Id
      in: header
      required: true
      description: Internal Gateway-propagated id of the authenticated admin user.
      schema:
        type: string
        format: uuid
    RolesHeader:
      name: X-User-Roles
      in: header
      required: false
      description: Internal Gateway-propagated user roles. Must contain ADMIN.
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    AdminForbidden:
      description: ADMIN role required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AdminSummary:
      type: object
      required: [users, cities, routes, trips, bookings, payments, cargoOrders, auditEvents]
      properties:
        users:
          type: integer
          format: int64
        cities:
          type: integer
          format: int64
        routes:
          type: integer
          format: int64
        trips:
          type: integer
          format: int64
        bookings:
          type: integer
          format: int64
        payments:
          type: integer
          format: int64
        cargoOrders:
          type: integer
          format: int64
        auditEvents:
          type: integer
          format: int64
    AdminAuditEvent:
      type: object
      required: [id, actorId, action, resourceType, payload, createdAt]
      properties:
        id:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
          format: uuid
          nullable: true
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    Role:
      type: string
      enum: [PASSENGER, DRIVER, ADMIN]
    User:
      type: object
      required: [id, email, phone, fullName, enabled, roles, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
        fullName:
          type: string
        enabled:
          type: boolean
        roles:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateRolesRequest:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          uniqueItems: true
          minItems: 1
          items:
            $ref: '#/components/schemas/Role'
    UpdateEnabledRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    City:
      type: object
      required: [id, name, region, country, active]
      properties:
        id:
