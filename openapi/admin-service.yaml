openapi: 3.0.3
info:
  title: Admin Service API
  version: 1.0.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: Admin Users
  - name: Admin Routes
  - name: Admin Trips
  - name: Admin Bookings
  - name: Admin Payments
  - name: Admin Drivers
  - name: Admin Cargo
paths:
  /api/admin/users:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Users]
      summary: List users
      operationId: adminListUsers
      responses:
        '200':
          description: Users visible to administrators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Users]
      summary: Get user by id
      operationId: adminGetUser
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/cities:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Routes]
      summary: List cities
      operationId: adminListCities
      responses:
        '200':
          description: Cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/routes:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Routes]
      summary: List routes
      operationId: adminListRoutes
      responses:
        '200':
          description: Routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Route'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/trips:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Trips]
      summary: List trips
      operationId: adminListTrips
      parameters:
        - name: routeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/trips/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Trips]
      summary: Get trip by id
      operationId: adminGetTrip
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/bookings:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Bookings]
      summary: List bookings
      operationId: adminListBookings
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tripId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/bookings/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Bookings]
      summary: Get booking by id
      operationId: adminGetBooking
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/payments:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Payments]
      summary: List payments
      operationId: adminListPayments
      parameters:
        - name: targetType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetType'
        - name: targetId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/payments/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Payments]
      summary: Get payment by id
      operationId: adminGetPayment
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/drivers:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Drivers]
      summary: List driver profiles
      operationId: adminListDrivers
      responses:
        '200':
          description: Driver profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverProfile'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/drivers/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Drivers]
      summary: Get driver profile by id
      operationId: adminGetDriver
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Driver profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverProfile'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/cargo-orders:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Cargo]
      summary: List cargo orders
      operationId: adminListCargoOrders
      parameters:
        - name: tripId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cargo orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CargoOrder'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/cargo-orders/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Cargo]
      summary: Get cargo order by id
      operationId: adminGetCargoOrder
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Cargo order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargoOrder'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/cargo-orders/trips/{tripId}/capacity:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Cargo]
      summary: Get cargo capacity for a trip
      operationId: adminGetTripCargoCapacity
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cargo capacity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CargoCapacity'
        '403':
          $ref: '#/components/responses/AdminForbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AdminUserIdHeader:
      name: X-User-Id
      in: header
      required: true
      description: Internal Gateway-propagated id of the authenticated admin user.
      schema:
        type: string
        format: uuid
    RolesHeader:
      name: X-User-Roles
      in: header
      required: false
      description: Internal Gateway-propagated user roles. Must contain ADMIN.
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    AdminForbidden:
      description: ADMIN role required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Role:
      type: string
      enum: [PASSENGER, DRIVER, ADMIN]
    User:
      type: object
      required: [id, email, phone, fullName, enabled, roles, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
        fullName:
          type: string
        enabled:
          type: boolean
        roles:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    City:
      type: object
      required: [id, name, region, country, active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        region:
          type: string
        country:
          type: string
        active:
          type: boolean
    Route:
      type: object
      required: [id, fromCityId, toCityId, distanceKm, estimatedDurationMinutes, active]
      properties:
        id:
          type: string
          format: uuid
        fromCityId:
          type: string
          format: uuid
        toCityId:
          type: string
          format: uuid
        distanceKm:
          type: integer
          format: int32
        estimatedDurationMinutes:
          type: integer
          format: int32
        active:
          type: boolean
    TripStatus:
      type: string
      enum: [SCHEDULED, IN_PROGRESS, COMPLETED, CANCELLED]
    Trip:
      type: object
      required: [id, routeId, departureTime, arrivalTime, totalSeats, availableSeats, totalCargoVolume, availableCargoVolume, price, status]
      properties:
        id:
          type: string
          format: uuid
        routeId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
        totalSeats:
          type: integer
          format: int32
        availableSeats:
          type: integer
          format: int32
        totalCargoVolume:
          type: number
          format: double
        availableCargoVolume:
          type: number
          format: double
        price:
          type: number
        status:
          $ref: '#/components/schemas/TripStatus'
    BookingStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELLED]
    Booking:
      type: object
      required: [id, userId, tripId, seatNumber, status, price, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        paymentId:
          type: string
          format: uuid
          nullable: true
        seatNumber:
          type: string
        status:
          $ref: '#/components/schemas/BookingStatus'
        price:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TargetType:
      type: string
      enum: [BOOKING, CARGO_ORDER]
    PaymentStatus:
      type: string
      enum: [PENDING, SUCCESS, FAILED, REFUNDED]
    Payment:
      type: object
      required: [id, targetType, targetId, userId, amount, currency, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        targetType:
          $ref: '#/components/schemas/TargetType'
        targetId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        idempotencyKey:
          type: string
          maxLength: 128
        amount:
          type: number
        currency:
          type: string
        status:
          $ref: '#/components/schemas/PaymentStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DriverAvailabilityStatus:
      type: string
      enum: [AVAILABLE, UNAVAILABLE, ON_TRIP, SUSPENDED]
    DriverProfile:
      type: object
      required: [id, userId, fullName, phone, licenseNumber, licenseCategory, licenseExpiresAt, availabilityStatus, active, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        fullName:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
        licenseCategory:
          type: string
        licenseExpiresAt:
          type: string
          format: date
        availabilityStatus:
          $ref: '#/components/schemas/DriverAvailabilityStatus'
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CargoStatus:
      type: string
      enum: [PENDING_PAYMENT, PAID, CANCELLED]
    CargoOrder:
      type: object
      required: [id, userId, tripId, description, weightKg, lengthCm, widthCm, heightCm, volumeM3, price, currency, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        description:
          type: string
        weightKg:
          type: number
        lengthCm:
          type: number
        widthCm:
          type: number
        heightCm:
          type: number
        volumeM3:
          type: number
        price:
          type: number
        currency:
          type: string
        paymentId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/CargoStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CargoCapacity:
      type: object
      required: [tripId, maxWeightKg, reservedWeightKg, availableWeightKg, maxVolumeM3, reservedVolumeM3, availableVolumeM3]
      properties:
        tripId:
          type: string
          format: uuid
        maxWeightKg:
          type: number
        reservedWeightKg:
          type: number
        availableWeightKg:
          type: number
        maxVolumeM3:
          type: number
        reservedVolumeM3:
          type: number
        availableVolumeM3:
          type: number
    ErrorResponse:
      type: object
      required: [timestamp, status, error, message, path]
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
