openapi: 3.0.3
info:
  title: Admin Service API
  version: 1.0.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: Admin Summary
  - name: Admin Audit
  - name: Admin Users
  - name: Admin Routes
  - name: Admin Trips
  - name: Admin Bookings
  - name: Admin Payments
  - name: Admin Drivers
  - name: Admin Cargo
paths:
  /api/admin/summary:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Summary]
      summary: Get admin dashboard summary
      operationId: adminGetSummary
      responses:
        '200':
          description: Aggregate counts for the admin dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSummary'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/audit-events:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Audit]
      summary: List admin audit events
      operationId: adminListAuditEvents
      parameters:
        - name: actorId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
        - name: resourceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Audit events sorted by creation time descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminAuditEvent'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/audit-events/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Audit]
      summary: Get admin audit event by id
      operationId: adminGetAuditEvent
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Audit event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuditEvent'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/users:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Users]
      summary: List users
      operationId: adminListUsers
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Role'
        - name: enabled
          in: query
          required: false
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Users visible to administrators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/users/{id}/roles:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    patch:
      tags: [Admin Users]
      summary: Update user roles
      operationId: adminUpdateUserRoles
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRolesRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/users/{id}/enabled:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    patch:
      tags: [Admin Users]
      summary: Update user enabled flag
      operationId: adminUpdateUserEnabled
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnabledRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Users]
      summary: Get user by id
      operationId: adminGetUser
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/cities:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Routes]
      summary: List cities
      operationId: adminListCities
      responses:
        '200':
          description: Cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/cities/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Routes]
      summary: Get city by id
      operationId: adminGetCity
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: City
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/City'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin Routes]
      summary: Delete city
      operationId: adminDeleteCity
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/admin/routes:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Routes]
      summary: List routes
      operationId: adminListRoutes
      responses:
        '200':
          description: Routes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Route'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/routes/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Routes]
      summary: Get route by id
      operationId: adminGetRoute
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin Routes]
      summary: Delete route
      operationId: adminDeleteRoute
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/admin/trips:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Trips]
      summary: List trips
      operationId: adminListTrips
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TripStatus'
        - name: routeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: driverId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
    post:
      tags: [Admin Trips]
      summary: Create trip
      operationId: adminCreateTrip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
      responses:
        '200':
          description: Created trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/trips/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Trips]
      summary: Get trip by id
      operationId: adminGetTrip
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin Trips]
      summary: Update trip
      operationId: adminUpdateTrip
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
      responses:
        '200':
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin Trips]
      summary: Cancel trip
      operationId: adminCancelTrip
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Cancelled trip
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/bookings:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Bookings]
      summary: List bookings
      operationId: adminListBookings
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BookingStatus'
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tripId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: paymentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/bookings/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Bookings]
      summary: Get booking by id
      operationId: adminGetBooking
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Admin Bookings]
      summary: Cancel booking
      operationId: adminCancelBooking
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Cancelled booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/payments:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Payments]
      summary: List payments
      operationId: adminListPayments
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - name: targetType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TargetType'
        - name: targetId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/payments/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Payments]
      summary: Get payment by id
      operationId: adminGetPayment
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/drivers:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Drivers]
      summary: List driver profiles
      operationId: adminListDrivers
      responses:
        '200':
          description: Driver profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverProfile'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /api/admin/drivers/{id}:
    parameters:
      - $ref: '#/components/parameters/AdminUserIdHeader'
      - $ref: '#/components/parameters/RolesHeader'
    get:
      tags: [Admin Drivers]
      summary: Get driver profile by id
      operationId: adminGetDriver
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Driver profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverProfile'
        '403':
