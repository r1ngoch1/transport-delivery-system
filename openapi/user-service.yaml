openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
x-curl-examples:
  register:
    description: Register a passenger and receive JWT.
    command: |
      curl -X POST http://localhost:8080/api/auth/register \
        -H "Content-Type: application/json" \
        -d '{"email":"test@example.com","phone":"+79990000000","password":"pass12345","fullName":"Test User","role":"PASSENGER"}'
  login:
    description: Login and copy accessToken from the response.
    command: |
      curl -X POST http://localhost:8080/api/auth/login \
        -H "Content-Type: application/json" \
        -d '{"email":"test@example.com","password":"pass12345"}'
  currentUser:
    description: Get current user profile through API Gateway.
    command: |
      curl http://localhost:8080/api/users/me \
        -H "Authorization: Bearer $TOKEN"
  updateCurrentUser:
    description: Update current user profile through API Gateway.
    command: |
      curl -X PATCH http://localhost:8080/api/users/me \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $TOKEN" \
        -d '{"fullName":"Updated User","phone":"+79990000001"}'
paths:
  /api/auth/register:
    post:
      summary: Register user
      responses:
        '201': { description: Created }
  /api/auth/login:
    post:
      summary: Login user
      responses:
        '200': { description: Authenticated }
  /api/users/me:
    get:
      summary: Current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    patch:
      summary: Update current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /api/users/{id}:
    get:
      summary: Get user by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
