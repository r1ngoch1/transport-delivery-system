openapi: 3.0.3
info:
  title: Route Service API
  version: 1.0.0
x-curl-examples:
  listCities:
    description: List seeded cities.
    command: |
      curl http://localhost:8080/api/cities
  getCity:
    description: Get seeded Ekaterinburg city by id.
    command: |
      curl http://localhost:8080/api/cities/11111111-1111-1111-1111-111111111111
  listRoutes:
    description: List seeded routes.
    command: |
      curl http://localhost:8080/api/routes
  getRoute:
    description: Get seeded route by id.
    command: |
      curl http://localhost:8080/api/routes/33333333-3333-3333-3333-333333333333
  searchRoutes:
    description: Search route from Ekaterinburg to Chelyabinsk.
    command: |
      curl "http://localhost:8080/api/routes/search?fromCityId=11111111-1111-1111-1111-111111111111&toCityId=22222222-2222-2222-2222-222222222222"
  createCityAsAdmin:
    description: Create city, requires ADMIN token.
    command: |
      curl -X POST http://localhost:8080/api/cities \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $ADMIN_TOKEN" \
        -d '{"name":"Tyumen","region":"Tyumen Oblast","country":"Russia","active":true}'
paths:
  /api/cities:
    get:
      summary: List cities
      responses:
        '200': { description: OK }
    post:
      summary: Create city
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /api/cities/{id}:
    get:
      summary: Get city
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
    patch:
      summary: Update city
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /api/routes:
    get:
      summary: List routes
      responses:
        '200': { description: OK }
    post:
      summary: Create route
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /api/routes/{id}:
    get:
      summary: Get route
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /api/routes/search:
    get:
      summary: Search routes
      parameters:
        - name: fromCityId
          in: query
          schema: { type: string, format: uuid }
        - name: toCityId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
