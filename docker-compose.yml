services:
  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service
    ports:
      - "15433:5432"

  postgres-route:
    image: postgres:16
    environment:
      POSTGRES_DB: route_db
      POSTGRES_USER: route_service
      POSTGRES_PASSWORD: route_service
    ports:
      - "15434:5432"

  postgres-trip:
    image: postgres:16
    environment:
      POSTGRES_DB: trip_db
      POSTGRES_USER: trip_service
      POSTGRES_PASSWORD: trip_service
    ports:
      - "15435:5432"

  postgres-booking:
    image: postgres:16
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_service
      POSTGRES_PASSWORD: booking_service
    ports:
      - "15436:5432"

  postgres-payment:
    image: postgres:16
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_service
      POSTGRES_PASSWORD: payment_service
    ports:
      - "15437:5432"

  kafka:
    image: apache/kafka:3.7.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
