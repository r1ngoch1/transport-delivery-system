  payment-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services/payment-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8889
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/payment_db
      SPRING_DATASOURCE_USERNAME: payment_service
      SPRING_DATASOURCE_PASSWORD: payment_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8087:8087"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
