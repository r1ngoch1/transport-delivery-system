      SPRING_DATASOURCE_USERNAME: admin_service
      SPRING_DATASOURCE_PASSWORD: admin_service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8089:8089"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      route-service:
        condition: service_healthy
      trip-service:
        condition: service_healthy
      driver-service:
        condition: service_healthy
      cargo-service:
        condition: service_healthy
      postgres-admin:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  booking-service:
    build:
      context: .
      args:
        SERVICE_MODULE: services/booking-service
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8889
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-booking:5432/booking_db
      SPRING_DATASOURCE_USERNAME: booking_service
      SPRING_DATASOURCE_PASSWORD: booking_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres-booking:
        condition: service_healthy
